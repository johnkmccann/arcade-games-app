version: '3'

services:
  backend:
    build:
      context: ./backend
    ports:
      - '5001:5001'
    environment:
      - MONGO_URI=mongodb://mongo:27017/arcade_games
    depends_on:
      - mongo

  frontend:
    build:
      context: ./frontend
    ports:
      - '3000:3000'
    depends_on:
      - backend

  mongo:
    image: mongo:latest
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
