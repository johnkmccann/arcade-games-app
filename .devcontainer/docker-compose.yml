services:
  app:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    volumes:
      - ..:/workspace:cached
      - /workspace/frontend/node_modules
      - /workspace/backend/venv
    ports:
      - "5173:5173"
      - "5001:5001"
    environment:
      - MONGO_URI=mongodb://mongo:27017/arcade_games
      - PYTHONUNBUFFERED=1
    depends_on:
      - mongo
    command: /bin/sh -c "while sleep 1000; do :; done"

  mongo:
    image: mongo:7
    restart: always
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
